<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Dashboard</title>
    <style>
        /* General layout styles designed to look organic and highly usable */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .input-group input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        .btn-add { background-color: #2ecc71; color: white; }
        .btn-toggle { background-color: #3498db; color: white; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 13px;}
        .btn-delete { background-color: #e74c3c; color: white; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 13px;}
        .btn-save { background-color: #f39c12; color: white; padding: 6px 12px;}
        
        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #eee;
            gap: 10px;
        }
        .task-item.Completed .task-text {
            text-decoration: line-through;
            color: #95a5a6;
        }
        .task-text-container {
            flex: 1;
        }
        .edit-form {
            display: flex;
            gap: 5px;
            width: 100%;
        }
        .edit-input {
            flex: 1;
            padding: 5px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
        }
        .badge-pending { background-color: #ffeaa7; color: #d63031; }
        .badge-completed { background-color: #dff9fb; color: #0984e3; }
    </style>
</head>
<body>

<div class="container">
    <h1>My To-Do Workspace</h1>

    <form action="/add" method="POST" class="input-group">
        <input type="text" name="task_name" placeholder="What needs to be done today?" required autocomplete="off">
        <button type="submit" class="btn btn-add">Add Task</button>
    </form>

    <ul class="task-list">
        {% if not tasks %}
            <li style="text-align: center; color: #7f8c8d; padding: 20px;">No tasks on your radar right now. Nice job!</li>
        {% endif %}
        
        {% for item in tasks %}
            <li class="task-item {{ item.status }}">
                
                <div class="task-text-container">
                    <form action="/update/{{ item.id }}" method="POST" class="edit-form">
                        <input type="text" name="updated_task_name" class="edit-input" value="{{ item.task }}">
                        <button type="submit" class="btn btn-save">Update</button>
                    </form>
                </div>

                <div class="actions">
                    {% if item.status == 'Pending' %}
                        <span class="badge badge-pending">Pending</span>
                    {% else %}
                        <span class="badge badge-completed">Completed</span>
                    {% endif %}
                    
                    <a href="/toggle/{{ item.id }}" class="btn-toggle">✓ Mark</a>
                    <a href="/delete/{{ item.id }}" class="btn-delete" onclick="return confirm('Remove this task permanently?')">✕ Delete</a>
                </div>
            </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
