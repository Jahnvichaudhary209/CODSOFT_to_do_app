<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 24px 16px;
      color: #222;
    }
    .container { max-width: 580px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: #888; margin-bottom: 24px; }

    .card {
      background: white; border-radius: 10px;
      padding: 20px; margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .card h2 {
      font-size: 13px; font-weight: 600; color: #666;
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 14px;
    }

    .form-row { margin-bottom: 10px; }
    label { display: block; font-size: 11px; font-weight: 600; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    input[type=text], textarea, select {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd;
      border-radius: 7px; font-size: 14px; color: #222;
      outline: none; transition: border-color 0.2s; font-family: inherit;
    }
    textarea { resize: vertical; min-height: 60px; }
    input:focus, textarea:focus, select:focus { border-color: #2563eb; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .error-msg { font-size: 12px; color: #dc2626; min-height: 16px; margin-bottom: 8px; }

    .btn {
      padding: 9px 18px; border: none; border-radius: 7px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #f3f4f6; color: #555; }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #fecaca; }
    .btn-sm { padding: 5px 11px; font-size: 12px; }
    .btn-full { width: 100%; }

  
    .tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .tab {
      padding: 6px 14px; border-radius: 20px; font-size: 12px;
      font-weight: 600; cursor: pointer; border: 1px solid #e5e7eb;
      background: white; color: #666; transition: all 0.15s; font-family: inherit;
    }
    .tab.active { background: #2563eb; color: white; border-color: #2563eb; }

    
    .stats {
      display: flex; gap: 16px; margin-bottom: 14px;
      font-size: 12px; color: #888;
    }
    .stat span { font-weight: 700; color: #222; }

    /* Todo items */
    .todo-list { display: flex; flex-direction: column; gap: 8px; }
    .todo-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px 14px; background: #f9fafb;
      border: 1px solid #eee; border-radius: 8px;
      transition: border-color 0.15s;
    }
    .todo-item:hover { border-color: #d1d5db; }
    .todo-item.done { opacity: 0.55; }

    .todo-check {
      width: 18px; height: 18px; border-radius: 5px;
      border: 2px solid #d1d5db; background: white;
      cursor: pointer; flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .todo-item.done .todo-check { background: #2563eb; border-color: #2563eb; }
    .check-tick { color: white; font-size: 11px; display: none; }
    .todo-item.done .check-tick { display: block; }

    .todo-body { flex: 1; min-width: 0; }
    .todo-title {
      font-size: 14px; font-weight: 600; color: #111;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .todo-item.done .todo-title { text-decoration: line-through; color: #888; }
    .todo-desc { font-size: 12px; color: #888; margin-top: 2px; }
    .todo-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; }

    .priority-badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 10px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .p-high   { background: #fee2e2; color: #dc2626; }
    .p-medium { background: #fef9c3; color: #ca8a04; }
    .p-low    { background: #dcfce7; color: #16a34a; }

    .todo-date { font-size: 11px; color: #bbb; }
    .todo-actions { display: flex; gap: 5px; flex-shrink: 0; }

    .empty { text-align: center; padding: 28px; color: #bbb; font-size: 13px; }


    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 100;
      align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 12px; padding: 24px;
      width: 100%; max-width: 400px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }

    
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #111; color: white; padding: 10px 20px;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
      z-index: 200; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ To-Do List</h1>
    <p class="page-sub">Stay on top of your tasks</p>

    
    <div class="card">
      <h2>Add New Task</h2>
      <div class="form-row">
        <label>Task Title *</label>
        <input type="text" id="addTitle" placeholder="What do you need to do?"/>
      </div>
      <div class="form-row">
        <label>Description (optional)</label>
        <textarea id="addDesc" placeholder="Add more details..."></textarea>
      </div>
      <div class="form-row-2">
        <div>
          <label>Priority</label>
          <select id="addPriority">
            <option value="high">🔴 High</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
      </div>
      <div class="error-msg" id="addError"></div>
      <button class="btn btn-primary btn-full" onclick="addTodo()">Add Task</button>
    </div>

    <div class="card">
      <h2>My Tasks</h2>

      <div class="stats">
        <div>Total: <span id="statTotal">0</span></div>
        <div>Done: <span id="statDone">0</span></div>
        <div>Pending: <span id="statPending">0</span></div>
      </div>

     
      <div class="tabs">
        <button class="tab active" onclick="setFilter('all', this)">All</button>
        <button class="tab" onclick="setFilter('pending', this)">Pending</button>
        <button class="tab" onclick="setFilter('done', this)">Done</button>
        <button class="tab" onclick="setFilter('high', this)">🔴 High</button>
        <button class="tab" onclick="setFilter('medium', this)">🟡 Medium</button>
        <button class="tab" onclick="setFilter('low', this)">🟢 Low</button>
      </div>

      <div class="todo-list" id="todoList">
        <div class="empty">No tasks yet. Add one above!</div>
      </div>
    </div>
  </div>


  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h2>Edit Task</h2>
      <input type="hidden" id="editId"/>
      <div class="form-row">
        <label>Title *</label>
        <input type="text" id="editTitle" placeholder="Task title"/>
      </div>
      <div class="form-row">
        <label>Description</label>
        <textarea id="editDesc" placeholder="Details..."></textarea>
      </div>
      <div class="form-row">
        <label>Priority</label>
        <select id="editPriority">
          <option value="high">🔴 High</option>
          <option value="medium">🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
      <div class="error-msg" id="editError"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let allTodos = [];
    let currentFilter = 'all';

    loadTodos();

    async function loadTodos() {
      const res = await fetch('/todos');
      allTodos = await res.json();
      renderTodos();
      updateStats();
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderTodos();
    }

    function getFiltered() {
      if (currentFilter === 'all')     return allTodos;
      if (currentFilter === 'done')    return allTodos.filter(t => t.done);
      if (currentFilter === 'pending') return allTodos.filter(t => !t.done);
      return allTodos.filter(t => t.priority === currentFilter);
    }

    function renderTodos() {
      const list = document.getElementById('todoList');
      const filtered = getFiltered();
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">No tasks here.</div>';
        return;
      }
      // Sort: undone first, then by priority
      const order = { high: 0, medium: 1, low: 2 };
      const sorted = [...filtered].sort((a, b) => {
        if (a.done !== b.done) return a.done ? 1 : -1;
        return order[a.priority] - order[b.priority];
      });
      list.innerHTML = sorted.map(t => `
        <div class="todo-item ${t.done ? 'done' : ''}" id="item-${t.id}">
          <div class="todo-check" onclick="toggleDone(${t.id})">
            <span class="check-tick">✓</span>
          </div>
          <div class="todo-body">
            <div class="todo-title">${escHtml(t.title)}</div>
            ${t.description ? `<div class="todo-desc">${escHtml(t.description)}</div>` : ''}
            <div class="todo-meta">
              <span class="priority-badge p-${t.priority}">${t.priority}</span>
              <span class="todo-date">${t.created_at}</span>
            </div>
          </div>
          <div class="todo-actions">
            <button class="btn btn-secondary btn-sm" onclick="openEdit(${t.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteTodo(${t.id})">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function updateStats() {
      const total   = allTodos.length;
      const done    = allTodos.filter(t => t.done).length;
      const pending = total - done;
      document.getElementById('statTotal').textContent   = total;
      document.getElementById('statDone').textContent    = done;
      document.getElementById('statPending').textContent = pending;
    }

    async function addTodo() {
      const title    = document.getElementById('addTitle').value.trim();
      const desc     = document.getElementById('addDesc').value.trim();
      const priority = document.getElementById('addPriority').value;
      document.getElementById('addError').textContent = '';

      const res = await fetch('/todos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description: desc, priority })
      });
      const data = await res.json();
      if (!res.ok) { document.getElementById('addError').textContent = data.error; return; }

      document.getElementById('addTitle').value = '';
      document.getElementById('addDesc').value  = '';
      document.getElementById('addPriority').value = 'medium';
      showToast('Task added!');
      loadTodos();
    }

    async function toggleDone(id) {
      const todo = allTodos.find(t => t.id === id);
      if (!todo) return;
      await fetch(`/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ done: !todo.done })
      });
      showToast(todo.done ? 'Marked as pending.' : 'Task completed!');
      loadTodos();
    }

    async function deleteTodo(id) {
      if (!confirm('Delete this task?')) return;
      await fetch(`/todos/${id}`, { method: 'DELETE' });
      showToast('Task deleted.');
      loadTodos();
    }

    function openEdit(id) {
      const t = allTodos.find(t => t.id === id);
      if (!t) return;
      document.getElementById('editId').value       = t.id;
      document.getElementById('editTitle').value    = t.title;
      document.getElementById('editDesc').value     = t.description || '';
      document.getElementById('editPriority').value = t.priority;
      document.getElementById('editError').textContent = '';
      document.getElementById('editModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('open');
    }

    async function saveEdit() {
      const id       = parseInt(document.getElementById('editId').value);
      const title    = document.getElementById('editTitle').value.trim();
      const desc     = document.getElementById('editDesc').value.trim();
      const priority = document.getElementById('editPriority').value;
      document.getElementById('editError').textContent = '';

      const res = await fetch(`/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description: desc, priority })
      });
      const data = await res.json();
      if (!res.ok) { document.getElementById('editError').textContent = data.error; return; }
      closeModal();
      showToast('Task updated!');
      loadTodos();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    document.getElementById('addTitle').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });
  </script>
</body>
</html>
